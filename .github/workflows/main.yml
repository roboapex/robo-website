name: Deploy

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    name: Trigger & Track Deployment
    runs-on: ubuntu-latest

    steps:
      # ── 1. Mark commit as "pending" immediately ───────────────────────────
      - name: Set commit status → pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              sha:   context.sha,
              state:       'pending',
              context:     'CI / deploy',
              description: 'Deployment queued…',
              target_url:  `${{ secrets.DEPLOY_URL }}/dashboard`,
            });

      # ── 2. Trigger the deployment ─────────────────────────────────────────
      - name: Trigger deployment
        id: trigger
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.DEPLOY_URL }}/api/application.deploy" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ secrets.DEPLOY_APP_ID }}"}')

          HTTP_BODY=$(echo "$RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)

          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "response=$HTTP_BODY"  >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Deploy request rejected (HTTP $HTTP_CODE)"
            echo "Response: $HTTP_BODY"
            exit 1
          fi

          echo "✅ Deploy triggered (HTTP $HTTP_CODE)"

      # ── 3. Poll until the deployment settles ──────────────────────────────
      - name: Poll deployment status
        id: poll
        run: |
          MAX_ATTEMPTS=40   # 40 × 15 s = 10 min timeout
          SLEEP_SEC=15
          ATTEMPT=0
          FINAL_STATUS="unknown"

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "⏳ Poll attempt $ATTEMPT / $MAX_ATTEMPTS …"

            APP_JSON=$(curl -s \
              "${{ secrets.DEPLOY_URL }}/api/application.one?applicationId=${{ secrets.DEPLOY_APP_ID }}" \
              -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}")

            APP_STATUS=$(echo "$APP_JSON" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('applicationStatus','unknown'))" 2>/dev/null || echo "unknown")

            echo "   applicationStatus = $APP_STATUS"

            case "$APP_STATUS" in
              done)
                FINAL_STATUS="success"
                break
                ;;
              error)
                FINAL_STATUS="failure"
                break
                ;;
              idle|running)
                sleep $SLEEP_SEC
                ;;
              *)
                echo "   Unexpected status '$APP_STATUS', retrying…"
                sleep $SLEEP_SEC
                ;;
            esac
          done

          if [ "$FINAL_STATUS" = "unknown" ]; then
            echo "⚠️  Timed out waiting for deployment to finish."
            FINAL_STATUS="failure"
          fi

          echo "final_status=$FINAL_STATUS" >> $GITHUB_OUTPUT
          echo "deploy_status=$APP_STATUS"  >> $GITHUB_OUTPUT

      # ── 4a. Mark commit as success ────────────────────────────────────────
      - name: Set commit status → success
        if: steps.poll.outputs.final_status == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              sha:   context.sha,
              state:       'success',
              context:     'CI / deploy',
              description: 'Deployment succeeded ✅',
              target_url:  `${{ secrets.DEPLOY_URL }}/dashboard`,
            });

      # ── 4b. Mark commit as failure ────────────────────────────────────────
      - name: Set commit status → failure
        if: >
          steps.poll.outputs.final_status == 'failure' ||
          failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              sha:   context.sha,
              state:       'failure',
              context:     'CI / deploy',
              description: 'Deployment failed ❌',
              target_url:  `${{ secrets.DEPLOY_URL }}/dashboard`,
            });
